version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3

    container_name: iada-gis

    environment: 
      POSTGRES_USER: iada
      POSTGRES_PASSWORD: iada123
      POSTGRES_DB: iada_gis
    
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iada -d iada_gis"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes: 
  postgres_data:
    driver: local